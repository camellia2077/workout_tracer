# Environment configuration shared across tests

[run_control]
enable_environment_clean = 1
enable_environment_prepare = 1

[paths]
project_apps_root = "${repo_root}/apps"
project_build_root = "${repo_root}/build"
default_build_dir = "build_agent"
target_executables_dir = "${repo_root}/output/tests/workout_calculator/workspace"
output_dir_name = "${repo_root}/output/tests/workout_calculator/artifacts"
db_dir = "${repo_root}/output/tests/workout_calculator/workspace/output/db/workout_logs.sqlite3"
export_output_dir = "${repo_root}/output/tests/workout_calculator/workspace/output/reports"
py_output_dir = "${repo_root}/output/tests/workout_calculator/logs"
processed_json_dir = "${repo_root}/output/tests/workout_calculator/workspace/output/data"

[cli_names]
executable_cli_name = "workout_tracker_cli.exe"
executable_app_name = "workout_calculator.exe"
generated_db_file_name = "workout_logs.sqlite3"

[cleanup]
files_to_copy = ["workout_tracker_cli.exe"]
folders_to_copy = ["config"]
