[tool.ruff]
line-length = 100
target-version = "py311"
src = ["tools", "test"]
extend-exclude = [
    "build",
    "output",
    "apps/workout_android/.gradle",
    "apps/workout_android/**/build",
    "apps/workout_android/**/.cxx",
    "apps/workout_android/**/.externalNativeBuild",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "B",
]
ignore = [
    "E501",
]

[tool.ruff.lint.per-file-ignores]
"test/run.py" = ["E402"]
"test/suites/lint_suites.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
